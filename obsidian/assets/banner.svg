  <text x="952" y="462" font-family="'Courier New',monospace" font-size="10" fill="#0088ff">&#9632; LOW 3</text>
  <text x="1010" y="462" font-family="'Courier New',monospace" font-size="10" fill="#7a5a7a">&#9632; INFO 12</text>
</g>
<g class="l17">
  <rect x="706" y="480" width="7" height="13" fill="#00fff2" rx="1" class="cursor-blink"/>
</g>
<g class="banner-final">
  <rect x="690" y="518" width="560" height="28" rx="2" fill="rgba(255,0,200,0.07)" stroke="#ff00c8" stroke-width="0.5" opacity="0.9"/>
  <text x="970" y="537" font-family="'Courier New',monospace" font-size="10" fill="#ff00c8" text-anchor="middle" letter-spacing="3">&#9632; SCAN COMPLETE — REVIEW FINDINGS AND EXPORT REPORT &#9632;</text>
</g>

<polyline points="1220,572 1240,572 1240,592" fill="none" stroke="#00fff2" stroke-width="1.5" opacity="0.5"/>
<polyline points="1220,68 1240,68 1240,48" fill="none" stroke="#ff00c8" stroke-width="1.5" opacity="0.7"/>
<circle cx="1240" cy="48" r="3" fill="#ff00c8" opacity="0.6">
