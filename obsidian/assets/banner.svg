<svg width="100%" viewBox="0 0 1280 640" role="img" xmlns="http://www.w3.org/2000/svg">
<title>OBSIDIAN — Animated GitHub Banner</title>
<desc>Animated cyberpunk banner for the OBSIDIAN open source security scanner</desc>

<defs>
  <pattern id="sl" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
    <rect x="0" y="0" width="1" height="1" fill="#000" opacity="1"/>
  </pattern>
  <clipPath id="gc1"><rect x="0" y="130" width="640" height="40"/></clipPath>
  <clipPath id="gc2"><rect x="0" y="200" width="640" height="28"/></clipPath>
  <linearGradient id="beam-grad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#060408" stop-opacity="0"/>
    <stop offset="30%"  stop-color="#ff00c8" stop-opacity="0.8"/>
    <stop offset="70%"  stop-color="#00fff2" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#060408" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="prog-grad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#ff00c8"/>
    <stop offset="100%" stop-color="#00fff2"/>
  </linearGradient>
  <style>
    @keyframes glitch {
      0%,85%,100%  { transform:translate(0,0); opacity:1; }
      86%          { transform:translate(-4px,2px); opacity:0.9; }
      88%          { transform:translate(4px,-2px); opacity:0.9; }
      90%          { transform:translate(0,0); opacity:1; }
    }
    @keyframes gl-cyan {
      0%,85%,92%,100% { opacity:0; transform:translate(0,0); }
      86%             { opacity:0.5; transform:translate(5px,-2px); }
      89%             { opacity:0.3; transform:translate(-3px,1px); }
      91%             { opacity:0; }
    }
    @keyframes gl-pink {
      0%,87%,93%,100% { opacity:0; transform:translate(0,0); }
      88%             { opacity:0.4; transform:translate(-5px,3px); }
      91%             { opacity:0.2; transform:translate(2px,-1px); }
      92%             { opacity:0; }
    }
    .logo-main  { animation:glitch  5s infinite; transform-origin:left center; }
    .logo-cyan  { animation:gl-cyan 5s infinite; transform-origin:left center; }
    .logo-pink  { animation:gl-pink 5s infinite; transform-origin:left center; }
    @keyframes beacon {
      0%,100% { opacity:0.7; } 50% { opacity:1; }
    }
    .beacon { animation:beacon 2s infinite ease-in-out; }
    @keyframes tblink {
      0%,49%,100% { opacity:0; } 50%,99% { opacity:1; }
    }
    .cursor-blink { animation:tblink 1s step-end infinite; }
    @keyframes beam {
      0%   { transform:translateY(-10px); opacity:0; }
      5%   { opacity:0.6; }
      95%  { opacity:0.6; }
      100% { transform:translateY(650px); opacity:0; }
    }
    .scan-beam { animation:beam 4s linear infinite; }
    @keyframes fadein {
      from { opacity:0; transform:translateX(-4px); }
      to   { opacity:1; transform:translateX(0); }
    }
    .l1  { animation:fadein .3s ease  0.2s both; }
    .l2  { animation:fadein .3s ease  0.7s both; }
    .l3  { animation:fadein .3s ease  1.1s both; }
    .l4  { animation:fadein .3s ease  1.5s both; }
    .l5  { animation:fadein .3s ease  1.9s both; }
    .l6  { animation:fadein .3s ease  2.3s both; }
    .l7  { animation:fadein .3s ease  2.7s both; }
    .l8  { animation:fadein .3s ease  3.1s both; }
    .l9  { animation:fadein .3s ease  3.5s both; }
    .l10 { animation:fadein .3s ease  3.9s both; }
    .l11 { animation:fadein .3s ease  4.3s both; }
    .l12 { animation:fadein .3s ease  4.7s both; }
    .l13 { animation:fadein .3s ease  5.1s both; }
    .l14 { animation:fadein .3s ease  5.5s both; }
    .l15 { animation:fadein .3s ease  5.9s both; }
    .l16 { animation:fadein .3s ease  6.3s both; }
    .l17 { animation:fadein .3s ease  6.7s both; }
    .banner-final { animation:fadein .5s ease 7.6s both; }
    @keyframes riskin {
      0%   { opacity:0; font-size:12px; }
      60%  { opacity:1; font-size:22px; }
      100% { opacity:1; font-size:20px; }
    }
    .risk-num { animation:riskin .6s ease 6.5s both; }
    .tag1 { animation:fadein .4s ease 0.4s both; }
    .tag2 { animation:fadein .4s ease 0.6s both; }
    .tag3 { animation:fadein .4s ease 0.8s both; }
    .tag4 { animation:fadein .4s ease 1.0s both; }
    .tag5 { animation:fadein .4s ease 1.2s both; }
    @keyframes logo-in {
      from { opacity:0; letter-spacing:2px; }
      to   { opacity:1; letter-spacing:8px; }
    }
    .logo-reveal { animation:logo-in 1s cubic-bezier(.16,1,.3,1) .1s both; }
    @keyframes slide-up {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .tagline-reveal { animation:slide-up .8s ease  0.9s both; }
    .desc-reveal    { animation:slide-up .8s ease  1.4s both; }
    .url-reveal     { animation:slide-up .8s ease  1.8s both; }
    @keyframes progress {
      from { width:0; } to { width:528px; }
    }
    .prog-bar { animation:progress 6s linear 1.5s both; }
    @keyframes glow-pulse {
      0%,100% { opacity:.05; } 50% { opacity:.10; }
    }
    .left-glow { animation:glow-pulse 3s ease-in-out infinite; }
  </style>
</defs>

<rect width="1280" height="640" fill="#060408"/>
<ellipse cx="0" cy="320" rx="320" ry="300" fill="#ff00c8" class="left-glow"/>

<g stroke="#ff00c8" stroke-width="0.4" opacity="0.04">
  <line x1="0" y1="64" x2="1280" y2="64"/><line x1="0" y1="128" x2="1280" y2="128"/>
  <line x1="0" y1="192" x2="1280" y2="192"/><line x1="0" y1="256" x2="1280" y2="256"/>
  <line x1="0" y1="320" x2="1280" y2="320"/><line x1="0" y1="384" x2="1280" y2="384"/>
  <line x1="0" y1="448" x2="1280" y2="448"/><line x1="0" y1="512" x2="1280" y2="512"/>
  <line x1="0" y1="576" x2="1280" y2="576"/>
  <line x1="64" y1="0" x2="64" y2="640"/><line x1="128" y1="0" x2="128" y2="640"/>
  <line x1="192" y1="0" x2="192" y2="640"/><line x1="256" y1="0" x2="256" y2="640"/>
  <line x1="320" y1="0" x2="320" y2="640"/><line x1="384" y1="0" x2="384" y2="640"/>
  <line x1="448" y1="0" x2="448" y2="640"/><line x1="512" y1="0" x2="512" y2="640"/>
  <line x1="576" y1="0" x2="576" y2="640"/><line x1="640" y1="0" x2="640" y2="640"/>
  <line x1="704" y1="0" x2="704" y2="640"/><line x1="768" y1="0" x2="768" y2="640"/>
  <line x1="832" y1="0" x2="832" y2="640"/><line x1="896" y1="0" x2="896" y2="640"/>
  <line x1="960" y1="0" x2="960" y2="640"/><line x1="1024" y1="0" x2="1024" y2="640"/>
  <line x1="1088" y1="0" x2="1088" y2="640"/><line x1="1152" y1="0" x2="1152" y2="640"/>
  <line x1="1216" y1="0" x2="1216" y2="640"/>
</g>

<rect x="0" y="0" width="1280" height="2" fill="url(#beam-grad)" class="scan-beam" opacity="0.5"/>
<rect width="1280" height="640" fill="url(#sl)" opacity="0.05"/>

<!-- LEFT -->
<polyline points="60,48 40,48 40,68" fill="none" stroke="#ff00c8" stroke-width="1.5" opacity="0.7"/>
<polyline points="60,592 40,592 40,572" fill="none" stroke="#00fff2" stroke-width="1.5" opacity="0.5"/>
<circle cx="40" cy="48" r="3" fill="#ff00c8" opacity="0.6" class="beacon"/>
<circle cx="40" cy="592" r="3" fill="#00fff2" opacity="0.6">
  <animate attributeName="opacity" values="0.6;1;0.6" dur="2.4s" repeatCount="indefinite"/>
</circle>

<text x="56" y="108" font-family="'Courier New',monospace" font-size="11" fill="#ff00c8" letter-spacing="3" opacity="0.7" class="tag1">v0.1.0 — OPEN SOURCE</text>

<text x="52" y="232" font-family="'Courier New',monospace" font-size="96" font-weight="900" letter-spacing="8" fill="#00fff2" opacity="0" clip-path="url(#gc1)" class="logo-cyan">0BS1D14N</text>
<text x="60" y="230" font-family="'Courier New',monospace" font-size="96" font-weight="900" letter-spacing="8" fill="#ff00c8" opacity="0" clip-path="url(#gc2)" class="logo-pink">0BS1D14N</text>
<text x="56" y="230" font-family="'Courier New',monospace" font-size="96" font-weight="900" letter-spacing="8" fill="#ffffff" class="logo-main logo-reveal">0BS1D14N</text>

<text x="58" y="278" font-family="'Courier New',monospace" font-size="15" fill="#00fff2" letter-spacing="6" class="tagline-reveal">OPEN SOURCE SECURITY SCANNER</text>

<line x1="56" y1="306" x2="56" y2="306" stroke="#ff00c8" stroke-width="0.5" opacity="0.3">
  <animate attributeName="x2" from="56" to="560" dur="1s" fill="freeze" begin="1s"/>
</line>

<g class="tag1"><rect x="56" y="320" width="80" height="22" rx="2" fill="none" stroke="#ff00c8" stroke-width="0.8" opacity="0.5"/><text x="96" y="335" font-family="'Courier New',monospace" font-size="10" fill="#ff00c8" text-anchor="middle" letter-spacing="1">WSL</text></g>
<g class="tag2"><rect x="148" y="320" width="90" height="22" rx="2" fill="none" stroke="#ff00c8" stroke-width="0.8" opacity="0.5"/><text x="193" y="335" font-family="'Courier New',monospace" font-size="10" fill="#ff00c8" text-anchor="middle" letter-spacing="1">ELECTRON</text></g>
<g class="tag3"><rect x="250" y="320" width="70" height="22" rx="2" fill="none" stroke="#00fff2" stroke-width="0.8" opacity="0.4"/><text x="285" y="335" font-family="'Courier New',monospace" font-size="10" fill="#00fff2" text-anchor="middle" letter-spacing="1">NMAP</text></g>
<g class="tag4"><rect x="332" y="320" width="80" height="22" rx="2" fill="none" stroke="#00fff2" stroke-width="0.8" opacity="0.4"/><text x="372" y="335" font-family="'Courier New',monospace" font-size="10" fill="#00fff2" text-anchor="middle" letter-spacing="1">NUCLEI</text></g>
<g class="tag5"><rect x="424" y="320" width="60" height="22" rx="2" fill="none" stroke="#ffe600" stroke-width="0.8" opacity="0.4"/><text x="454" y="335" font-family="'Courier New',monospace" font-size="10" fill="#ffe600" text-anchor="middle" letter-spacing="1">MIT</text></g>

<text x="56" y="386" font-family="'Courier New',monospace" font-size="11" fill="#7a5a7a" letter-spacing="2" class="desc-reveal">nmap · nikto · nuclei · ffuf · amass · hydra · sqlmap · whatweb</text>
<text x="56" y="420" font-family="'Courier New',monospace" font-size="12" fill="#c090c0" letter-spacing="2" opacity="0.7" class="url-reveal">github.com/happygream/OBSIDIAN</text>

<g class="desc-reveal">
  <text x="56" y="490" font-family="'Courier New',monospace" font-size="12" fill="#c090c0" letter-spacing="1">Desktop security scanner for authorised</text>
  <text x="56" y="510" font-family="'Courier New',monospace" font-size="12" fill="#c090c0" letter-spacing="1">penetration testing. 13 integrated tools.</text>
  <text x="56" y="530" font-family="'Courier New',monospace" font-size="12" fill="#c090c0" letter-spacing="1">Linux &amp; Windows via WSL. Real-time output.</text>
</g>

<line x1="660" y1="40" x2="660" y2="600" stroke="#ff00c8" stroke-width="0.5" opacity="0.2"/>

<!-- RIGHT — terminal -->
<rect x="690" y="60" width="560" height="500" rx="4" fill="#0b0810" stroke="#ff00c8" stroke-width="0.8" opacity="0.9"/>
<rect x="690" y="60" width="560" height="36" rx="4" fill="#0f0c14"/>
<rect x="690" y="82" width="560" height="14" fill="#0f0c14"/>
<circle cx="714" cy="78" r="5" fill="#ff5f57"/>
<circle cx="732" cy="78" r="5" fill="#febc2e"/>
<circle cx="750" cy="78" r="5" fill="#28c840"/>
<text x="970" y="83" font-family="'Courier New',monospace" font-size="11" fill="#7a5a7a" text-anchor="middle" letter-spacing="2">obsidian — live output</text>

<rect x="706" y="548" width="528" height="2" rx="1" fill="rgba(255,0,200,0.08)"/>
<rect x="706" y="548" width="0" height="2" rx="1" fill="url(#prog-grad)" class="prog-bar"/>

<rect x="706" y="110" width="528" height="28" rx="2" fill="#060408" stroke="#00fff2" stroke-width="0.5" opacity="0.5"/>
<text x="720" y="129" font-family="'Courier New',monospace" font-size="11" fill="#ff00c8">&#9658;</text>
<text x="735" y="129" font-family="'Courier New',monospace" font-size="11" fill="#00fff2" letter-spacing="1">https://target.example.com</text>

<g class="l1"><text x="706" y="162" font-family="'Courier New',monospace" font-size="11" fill="#7a5a7a">10:42:01</text><text x="770" y="162" font-family="'Courier New',monospace" font-size="11" fill="#c090c0">[-] WebSocket connected — OBSIDIAN v0.1.0</text></g>
<g class="l2"><text x="706" y="180" font-family="'Courier New',monospace" font-size="11" fill="#7a5a7a">10:42:02</text><text x="770" y="180" font-family="'Courier New',monospace" font-size="11" fill="#ff40d8">===  MODULE: NMAP  ===</text></g>
<g class="l3"><text x="706" y="198" font-family="'Courier New',monospace" font-size="11" fill="#7a5a7a">10:42:02</text><text x="770" y="198" font-family="'Courier New',monospace" font-size="11" fill="#00fff2">$  nmap -sV -sC -T4 --open target.example.com</text></g>
<g class="l4"><text x="706" y="216" font-family="'Courier New',monospace" font-size="11" fill="#7a5a7a">10:42:08</text><text x="770" y="216" font-family="'Courier New',monospace" font-size="11" fill="#00ff88">[+] 22/tcp   open  ssh     OpenSSH 8.9p1</text></g>
<g class="l5"><text x="706" y="234" font-family="'Courier New',monospace" font-size="11" fill="#7a5a7a">10:42:09</text><text x="770" y="234" font-family="'Courier New',monospace" font-size="11" fill="#00ff88">[+] 80/tcp   open  http    Apache httpd 2.4.7</text></g>
<g class="l6"><text x="706" y="252" font-family="'Courier New',monospace" font-size="11" fill="#7a5a7a">10:42:09</text><text x="770" y="252" font-family="'Courier New',monospace" font-size="11" fill="#00ff88">[+] 443/tcp  open  https   nginx 1.24.0</text></g>
<g class="l7"><text x="706" y="270" font-family="'Courier New',monospace" font-size="11" fill="#7a5a7a">10:42:15</text><text x="770" y="270" font-family="'Courier New',monospace" font-size="11" fill="#ff40d8">===  MODULE: NUCLEI  ===</text></g>
<g class="l8"><text x="706" y="288" font-family="'Courier New',monospace" font-size="11" fill="#7a5a7a">10:42:16</text><text x="770" y="288" font-family="'Courier New',monospace" font-size="11" fill="#ff2255">[!!] [CRITICAL] CVE-2024-1234 Remote Code Execution</text></g>
<g class="l9"><text x="706" y="306" font-family="'Courier New',monospace" font-size="11" fill="#7a5a7a">10:42:18</text><text x="770" y="306" font-family="'Courier New',monospace" font-size="11" fill="#ff6a00">[!]  [HIGH]     http-missing-security-headers</text></g>
<g class="l10"><text x="706" y="324" font-family="'Courier New',monospace" font-size="11" fill="#7a5a7a">10:42:20</text><text x="770" y="324" font-family="'Courier New',monospace" font-size="11" fill="#ffe600">[!]  [MEDIUM]   ssl-tls-version TLSv1.0 enabled</text></g>
<g class="l11"><text x="706" y="342" font-family="'Courier New',monospace" font-size="11" fill="#7a5a7a">10:42:31</text><text x="770" y="342" font-family="'Courier New',monospace" font-size="11" fill="#ff40d8">===  MODULE: FFUF  ===</text></g>
<g class="l12"><text x="706" y="360" font-family="'Courier New',monospace" font-size="11" fill="#7a5a7a">10:42:32</text><text x="770" y="360" font-family="'Courier New',monospace" font-size="11" fill="#00fff2">$  ffuf -u https://target.example.com/FUZZ -ac</text></g>
<g class="l13"><text x="706" y="378" font-family="'Courier New',monospace" font-size="11" fill="#7a5a7a">10:43:01</text><text x="770" y="378" font-family="'Courier New',monospace" font-size="11" fill="#00ff88">[+] /admin     [Status: 200, Size: 4821]</text></g>
<g class="l14"><text x="706" y="396" font-family="'Courier New',monospace" font-size="11" fill="#7a5a7a">10:43:04</text><text x="770" y="396" font-family="'Courier New',monospace" font-size="11" fill="#00ff88">[+] /api/v1    [Status: 200, Size: 312]</text></g>

<line x1="706" y1="416" x2="1234" y2="416" stroke="#ff00c8" stroke-width="0.3" opacity="0.3"/>

<g class="l15">
  <text x="706" y="438" font-family="'Courier New',monospace" font-size="11" fill="#7a5a7a" letter-spacing="2">RISK SCORE</text>
  <text x="808" y="438" font-family="'Courier New',monospace" font-size="20" font-weight="900" fill="#ff2255" class="risk-num">74</text>
  <text x="840" y="438" font-family="'Courier New',monospace" font-size="11" fill="#ff2255" letter-spacing="2">CRITICAL RISK</text>
</g>
<g class="l16">
  <text x="706" y="462" font-family="'Courier New',monospace" font-size="10" fill="#ff2255">&#9632; CRITICAL 2</text>
